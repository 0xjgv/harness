name: CI

on:
  push:
    branches: [main]
  pull_request:

# Local gate == remote gate: this runs the same `harness ci` you run locally.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      # uv provides `uvx`, which the complexity and CRAP gates use to run lizard.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # cargo-audit is required by ci's strict audit gate; cargo-llvm-cov and
      # cargo-modules back the coverage/CRAP and arch gates (installed from
      # prebuilt binaries so the run stays fast).
      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit, cargo-llvm-cov, cargo-modules

      - name: Run CI gate
        run: cargo harness ci
