name: CI

on:
  push:
    branches: [main]
  pull_request:

# Local gate == remote gate: this runs the same `harness ci` you run locally.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      # uv provides `uvx`, which the complexity and CRAP gates use to run lizard.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI gate
        run: bun harness.ts ci
