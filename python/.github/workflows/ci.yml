name: CI

on:
  push:
    branches: [main]
  pull_request:

# Local gate == remote gate: this runs the same `harness ci` you run locally.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync

      - name: Run CI gate
        run: uv run harness ci
