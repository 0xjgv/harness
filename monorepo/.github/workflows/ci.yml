name: CI

on:
  push:
    branches: [main]
  pull_request:

# Local gate == remote gate: `make ci` fans the read-only gate out to every
# subproject. This template ships every toolchain wired so any mix of
# subprojects works out of the box — trim the setup steps below to the
# languages you actually use.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install cargo tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit, cargo-llvm-cov, cargo-modules

      - name: Run CI gate
        run: make ci
