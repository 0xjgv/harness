name: CI

on:
  push:
    branches: [main]
  pull_request:

# Local gate == remote gate: this runs the same `harness ci` you run locally.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      # uv provides `uvx`, which the complexity and CRAP gates use to run lizard.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Download modules
        run: go mod download

      - name: Run CI gate
        run: go run harness.go ci
